name: Release Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      arm64_v8a:
        description: 'Build arm64-v8a - set to "y" to build'
        required: false
        default: 'y'
        type: string
      armeabi_v7a:
        description: 'Build armeabi-v7a - set to "y" to build'
        required: false
        default: ''
        type: string
      x86_64:
        description: 'Build x86_64 - set to "y" to build'
        required: false
        default: ''
        type: string
      universal:
        description: 'Build universal - set to "y" to build'
        required: false
        default: ''
        type: string
      upload:
        description: 'Skip upload - set to "y" to skip Telegram publish'
        required: false
        default: ''
        type: string

jobs:
  setup:
    name: Configure build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: matrix
        name: Resolve ABI list
        run: |
          set -euo pipefail
          abis=()

          [[ "${{ github.event.inputs.arm64_v8a }}" == "y" ]] && abis+=("arm64-v8a")
          [[ "${{ github.event.inputs.armeabi_v7a }}" == "y" ]] && abis+=("armeabi-v7a")
          [[ "${{ github.event.inputs.x86_64 }}" == "y" ]] && abis+=("x86_64")
          [[ "${{ github.event.inputs.universal }}" == "y" ]] && abis+=("universal")

          [[ ${#abis[@]} -eq 0 ]] && abis=("arm64-v8a")

          json=$(printf '"%s"\n' "${abis[@]}" | jq -s -c '{abi: .}')
          echo "matrix=$json" | tee -a "$GITHUB_OUTPUT"
          echo "Will build: ${abis[*]}"

  build:
    name: Gradle Build (${{ matrix.abi }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      NATIVE_TARGET: ${{ matrix.abi == 'universal' && '' || matrix.abi }}
    outputs:
      build_timestamp: ${{ steps.release_build_step.outputs.build_timestamp }}
      apk_name: ${{ steps.release_build_step.outputs.apk_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ matrix.abi }}
          max-size: 5G
          append-timestamp: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: 'on-failure'
          add-job-summary-as-pr-comment: never
          cache-cleanup: on-success

      - name: Set up Android SDK Tools
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;36.0.0 ndk;27.2.12479018 platforms;android-36"

      - name: Configure Android SDK Path
        run: |
          echo "sdk.dir=${ANDROID_HOME}" >> local.properties

      - name: Modify Gradle JVM Args
        run: |
          MEMORY_KB=$(awk '/MemTotal/ {print $2}' /proc/meminfo)
          MEMORY_GB=$((MEMORY_KB / 1024 / 1024))
          echo "Detected memory size: ${MEMORY_GB}GB"
          if [ $MEMORY_GB -ge 12 ]; then
            sed -i '/^org\.gradle\.jvmargs=/d' gradle.properties
            echo "org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=2G -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8" >> gradle.properties
          fi
          cat gradle.properties

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > TMessagesProj/release.keystore

      - name: Release Build
        id: release_build_step
        run: |
          export LOCAL_PROPERTIES="${{ secrets.LOCAL_PROPERTIES }}"
          export BUILD_TIMESTAMP=$(date +%s)
          echo "build_timestamp=$BUILD_TIMESTAMP" >> "$GITHUB_OUTPUT"
          ./gradlew TMessagesProj:assembleRelease

          APK=$(find TMessagesProj/build/outputs/apk -name "*${NATIVE_TARGET}*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found for ABI '${{ matrix.abi }}'"
            find TMessagesProj/build/outputs/apk -type f -ls
            exit 1
          fi
          APK_NAME=$(basename "$APK")
          APK_NAME_WITHOUT_EXT=${APK_NAME%.apk}
          echo "APK=$APK" >> $GITHUB_ENV
          echo "apk_name=$APK_NAME_WITHOUT_EXT" >> $GITHUB_OUTPUT

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_build_step.outputs.apk_name }}
          path: ${{ env.APK }}

      - name: Collect build logs on failure
        if: failure()
        run: |
          set +e
          mkdir -p build-logs
          cp -v gradle.properties local.properties build-logs/ 2>/dev/null || true
          find . -type d -name "reports" -path "*/build/*" -exec cp -r {} build-logs/ \; 2>/dev/null
          find . -type d -name "logs"    -path "*/build/*" -exec cp -r {} build-logs/ \; 2>/dev/null
          find . -type f -name "*.log"   -path "*/build/*" -exec cp    {} build-logs/ \; 2>/dev/null
          find ~/.gradle/daemon -type f -name "*.out.log" -exec cp {} build-logs/ \; 2>/dev/null
          ARCHIVE="build-logs-${{ github.run_id }}-${{ matrix.abi }}.zip"
          ( cd build-logs && zip -qr "../$ARCHIVE" . ) || true
          ls -lh "$ARCHIVE" || true

      - name: Upload build log archive
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}-${{ matrix.abi }}
          path: build-logs-${{ github.run_id }}-${{ matrix.abi }}.zip
          retention-days: 14
          if-no-files-found: warn

  upload:
    name: Upload release to Telegram
    if: github.event.inputs.upload != 'y' && !contains(github.event.head_commit.message, '[skip upload]')
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Send APK to Telegram
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_HASH: ${{ secrets.APP_HASH }}
          COMMIT_ID: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual run' }}
          BUILD_TIMESTAMP: ${{ needs.build.outputs.build_timestamp }}
        run: |
          export mini64=$(find artifacts -name "*arm64-v8a.apk")
          echo $mini64
          python -m pip install -r Tools/scripts/requirements.txt
          python Tools/scripts/upload.py ${{ secrets.HELPER_BOT_TOKEN }} ${{ secrets.HELPER_BOT_TARGET }} release ${{ secrets.HELPER_BOT_CANARY_TARGET }}

  upload-logs:
    name: Ship build logs to Telegram
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Download log archives
        uses: actions/download-artifact@v4
        with:
          path: logs
          pattern: 'build-logs-*'
          merge-multiple: true

      - name: Send log archives to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.HELPER_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.HELPER_BOT_TARGET }}
          COMMIT_ID: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual run' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
            echo "Telegram secrets not configured; skipping log upload."
            exit 0
          fi
          find logs -type f -name "*.zip" | while read -r ARCHIVE; do
            {
              printf 'Nagram XF build failed\n'
              printf 'Commit:  %s\n'  "${COMMIT_ID}"
              printf 'Run:     %s\n'  "${RUN_URL}"
              printf 'Message: %s\n'  "${COMMIT_MESSAGE}"
            } > caption.txt
            curl -sSf -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TG_CHAT_ID}" \
              -F caption="$(cat caption.txt)" \
              -F document=@"${ARCHIVE}" || true
          done
